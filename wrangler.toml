name = "tgadx"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# 普通变量（非机密）。部署前请填写 ADMIN_GROUP_ID 和 ADMIN_USER_ID。
[vars]
ADMIN_GROUP_ID = ""                                        # 管理群 id（开启话题/Forum，负数，形如 -100xxxxxxxxxx）
ADMIN_USER_ID = ""                                         # 你的 Telegram 用户 id
AI_BASE_URL = "https://api.deepseek.com/chat/completions"  # OpenAI 兼容接口；换供应商只改这里
AI_MODEL = "deepseek-v4-flash"                             # 判定用的便宜模型（OpenAI 兼容）
CLEANUP_DAYS = "30"                                        # 自动清理：未回复过的话题超过这么多天没新消息就删；"0" 关闭
AUTO_BLOCK = "1"                                           # 1=判为广告后自动拉黑该号；0=只拦截不拉黑（每条仍进广告话题）

# 定时任务：每天 03:00 UTC 自动清理（删除未回复过、超过 CLEANUP_DAYS 天没新消息的话题）
[triggers]
crons = ["0 3 * * *"]

# D1 数据库。先运行 `wrangler d1 create tg-bot-db`，把返回的 database_id 填进来。
# 表结构由代码在首次请求时自动创建（dbMigrate），无需手动跑 SQL。
[[d1_databases]]
binding = "TG_BOT_DB"
database_name = "tg-bot-db"
database_id = "<填入 wrangler d1 create tg-bot-db 返回的 database_id>"

# 机密变量用 `wrangler secret put` 设置，不要写在这里：
#   wrangler secret put BOT_TOKEN
#   wrangler secret put AI_API_KEY
#   wrangler secret put WEBHOOK_SECRET
